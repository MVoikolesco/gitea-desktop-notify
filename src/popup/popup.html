<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gitea Notifier</title>
    <link rel="stylesheet" href="../styles/common.css">
</head>
<body>
    <div class="container">
        <h1>🔔 Gitea Notifier</h1>
        
        <div class="status-section">
            <div id="status" class="status">🔴 Desconectado</div>
            <button id="checkNow" class="btn btn-primary">Verificar Agora</button>
        </div>

        <div class="settings-preview">
            <p><strong>Servidor:</strong> <span id="serverUrl">Não configurado</span></p>
            <p><strong>Intervalo de verificação:</strong> <span id="intervalValue">0.5</span> minutos</p>
        </div>

        <a href="../options/options.html" class="btn btn-secondary">⚙️ Configurações</a>
        <p class="footer">v1.0.0</p>
    </div>

    <script src="popup.js"></script>
</body>
</html>
